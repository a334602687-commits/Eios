<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eios IDE - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #1c1c1c; color: #ececec; font-family: -apple-system, sans-serif; }
        .bg-panel { background-color: #242424; }
        .border-panel { border-color: #383838; }
        ::-webkit-scrollbar { display: none; }
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .page { display: none; flex-direction: column; flex: 1; width: 100%; animation: fadeIn 0.3s ease-in-out; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="overflow-hidden flex flex-col h-screen relative">
    <div id="overlay" class="fixed inset-0 bg-black bg-opacity-60 z-40 hidden" onclick="toggleMenu()"></div>
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-[80%] max-w-[300px] bg-[#1c1c1c] border-r border-panel -translate-x-full z-50 flex flex-col overflow-hidden">
        <div class="p-5 flex items-center border-b border-panel gap-3 bg-panel/30">
            <img src="https://i.ibb.co/LNYWj4P/eios-ide-logo.png" alt="Eios Logo" class="h-10 w-auto rounded-md object-contain shadow-[0_0_15px_rgba(79,140,255,0.5)]">
            <div class="flex flex-col">
                <span class="font-bold text-lg leading-none tracking-tight text-white">Eios IDE</span>
                <span class="text-[10px] text-gray-500 mt-1">Official Mobile Editor</span>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="showPage('home')" class="w-full flex items-center gap-4 p-3 hover:bg-panel rounded-xl transition-all"><i data-lucide="home" class="w-5 h-5"></i> Home</button>
            <button onclick="showPage('projects')" class="w-full flex items-center gap-4 p-3 hover:bg-panel rounded-xl transition-all text-gray-400"><i data-lucide="folder-git-2" class="w-5 h-5"></i> Projects</button>
            <button onclick="showPage('integrations')" class="w-full flex items-center gap-4 p-3 hover:bg-panel rounded-xl transition-all text-gray-400"><i data-lucide="blocks" class="w-5 h-5"></i> Integrations</button>
            <button onclick="showPage('settings')" class="w-full flex items-center gap-4 p-3 hover:bg-panel rounded-xl transition-all text-gray-400"><i data-lucide="settings-2" class="w-5 h-5"></i> Settings</button>
        </nav>
        <div class="p-6 border-t border-panel text-[10px] text-gray-500 text-center uppercase tracking-widest">Version 1.0.0 Alpha</div>
    </aside>
    <header class="p-4 flex justify-between items-center z-30">
        <button onclick="toggleMenu()" class="p-2 hover:bg-panel rounded-lg transition-colors"><i data-lucide="align-left" class="w-6 h-6 text-gray-300"></i></button>
        <div id="status-bar" class="text-[10px] bg-panel px-3 py-1 rounded-full border border-panel flex items-center gap-2">
            <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div> Eios Online
        </div>
        <button class="p-2 hover:bg-panel rounded-lg"><i data-lucide="bell" class="w-5 h-5 text-gray-400"></i></button>
    </header>
    <div id="page-home" class="page active px-6 mt-10 w-full max-w-lg mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-bold mb-2">Hello, Agent.</h1>
            <p class="text-gray-500 text-sm">What amazing things will we build today?</p>
        </div>
        <div class="bg-panel rounded-2xl border border-panel p-4 shadow-2xl">
            <textarea id="chat-input" placeholder="Describe your web idea..." class="w-full bg-transparent outline-none text-white text-base h-24 placeholder-gray-600 resize-none"></textarea>
            <div class="flex justify-between items-center mt-2 pt-2 border-t border-panel">
                <button class="text-gray-500 hover:text-white p-2"><i data-lucide="paperclip" class="w-5 h-5"></i></button>
                <button onclick="startProject()" class="bg-white text-black p-2.5 rounded-xl active:scale-90 transition-all"><i data-lucide="send-horizontal" class="w-5 h-5"></i></button>
            </div>
        </div>
    </div>
    <div id="page-workspace" class="page">
        <div class="flex border-b border-panel bg-panel">
            <button onclick="switchTab('code')" id="tab-code" class="flex-1 py-4 border-b-2 border-blue-500 text-blue-400 text-xs font-bold flex justify-center items-center gap-2">📄 index.html</button>
            <button onclick="switchTab('preview')" id="tab-preview" class="flex-1 py-4 text-gray-500 text-xs font-bold flex justify-center items-center gap-2">🌐 Preview</button>
        </div>
        <div id="area-code" class="flex-1 p-4 bg-[#1e1e1e] overflow-auto"><textarea id="real-code" class="w-full h-full bg-transparent outline-none font-mono text-xs text-green-400 resize-none" spellcheck="false"></textarea></div>
        <iframe id="area-preview" class="hidden flex-1 bg-white border-none"></iframe>
    </div>
    <script>
        lucide.createIcons();
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('overlay').classList.toggle('hidden'); }
        function showPage(p) { toggleMenu(); document.querySelectorAll('.page').forEach(x => x.classList.remove('active')); document.getElementById('page-' + p).classList.add('active'); }
        function startProject() { 
            const prompt = document.getElementById('chat-input').value; if(!prompt) return;
            document.getElementById('real-code').value = `<!DOCTYPE html><html><body style="background:#1c1c1c;color:white;text-align:center;padding-top:50px;font-family:sans-serif;"><h1>${prompt}</h1><p>Được xây dựng bởi Eios IDE</p></body></html>`;
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active')); document.getElementById('page-workspace').classList.add('active');
        }
    </script>
</body>
</html>
