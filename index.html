<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eios IDE - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #1c1c1c; color: #ececec; font-family: -apple-system, sans-serif; }
        .bg-panel { background-color: #242424; }
        .border-panel { border-color: #383838; }
        ::-webkit-scrollbar { display: none; }
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .page { display: none; flex-direction: column; flex: 1; width: 100%; animation: fadeIn 0.3s ease-in-out; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
        /* Hiệu ứng hào quang cho logo */
        .logo-glow { shadow: 0 0 20px rgba(79, 140, 255, 0.6); }
    </style>
</head>
<body class="overflow-hidden flex flex-col h-screen relative">

    <div id="overlay" class="fixed inset-0 bg-black bg-opacity-60 z-40 hidden" onclick="toggleMenu()"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-[80%] max-w-[300px] bg-[#1c1c1c] border-r border-panel -translate-x-full z-50 flex flex-col overflow-hidden">
        <div class="p-5 flex items-center border-b border-panel gap-3 bg-panel/30">
            <div class="h-10 w-10 flex-shrink-0 relative">
                <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-[0_0_8px_rgba(79,140,255,0.8)]">
                    <defs>
                        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#4F8CFF;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#9D4FFF;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <rect x="20" y="25" width="60" height="10" rx="4" fill="url(#grad)" />
                    <rect x="20" y="45" width="60" height="10" rx="4" fill="url(#grad)" />
                    <rect x="20" y="65" width="60" height="10" rx="4" fill="url(#grad)" />
                    <circle cx="70" cy="50" r="8" fill="white" />
                    <circle cx="70" cy="50" r="12" fill="white" fill-opacity="0.3" />
                </svg>
            </div>
            <div class="flex flex-col">
                <span class="font-bold text-lg text-white">Eios IDE</span>
                <span class="text-[10px] text-gray-500 mt-1 uppercase tracking-tighter">Official Mobile Editor</span>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <button onclick="showPage('home')" class="w-full flex items-center gap-4 p-3 hover:bg-panel rounded-xl transition-all"><i data-lucide="home" class="w-5 h-5 text-blue-400"></i> Home</button>
            <button onclick="showPage('projects')" class="w-full flex items-center gap-4 p-3 hover:bg-panel rounded-xl transition-all text-gray-400"><i data-lucide="folder-git-2" class="w-5 h-5"></i> Projects</button>
            <button onclick="showPage('integrations')" class="w-full flex items-center gap-4 p-3 hover:bg-panel rounded-xl transition-all text-gray-400"><i data-lucide="blocks" class="w-5 h-5"></i> Integrations</button>
            <button onclick="showPage('settings')" class="w-full flex items-center gap-4 p-3 hover:bg-panel rounded-xl transition-all text-gray-400"><i data-lucide="settings-2" class="w-5 h-5"></i> Settings</button>
        </nav>
        <div class="p-6 border-t border-panel text-[10px] text-gray-500 text-center">Version 1.4 | Official</div>
    </aside>

    <header class="p-4 flex justify-between items-center z-30">
        <button onclick="toggleMenu()" class="p-2 hover:bg-panel rounded-lg"><i data-lucide="align-left" class="w-6 h-6 text-gray-300"></i></button>
        <div id="status-bar" class="text-[10px] bg-panel px-3 py-1 rounded-full border border-panel flex items-center gap-2">
            <div id="status-dot" class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div> <span id="status-text">Eios Online</span>
        </div>
        <button class="p-2 hover:bg-panel rounded-lg"><i data-lucide="bell" class="w-5 h-5 text-gray-400"></i></button>
    </header>

    <div id="page-home" class="page active px-6 mt-10 w-full max-w-lg mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-bold mb-2">Hello, Agent.</h1>
            <p class="text-gray-500 text-sm">What amazing things will we build today?</p>
        </div>
        <div class="bg-panel rounded-2xl border border-panel p-4 shadow-2xl focus-within:border-blue-500 transition-all">
            <textarea id="chat-input" placeholder="Describe your web idea..." class="w-full bg-transparent outline-none text-white text-base h-24 placeholder-gray-600 resize-none"></textarea>
            <div class="flex justify-between items-center mt-2 pt-2 border-t border-panel">
                <button class="text-gray-500 hover:text-white p-2"><i data-lucide="paperclip" class="w-5 h-5"></i></button>
                <button id="btn-send" onclick="startAIBuild()" class="bg-white text-black p-2.5 rounded-xl active:scale-90 transition-all shadow-md">
                    <i data-lucide="send-horizontal" id="icon-send" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="page-workspace" class="page">
        <div class="flex border-b border-panel bg-panel">
            <button onclick="switchTab('code')" id="tab-code" class="flex-1 py-4 border-b-2 border-blue-500 text-blue-400 text-xs font-bold">📄 index.html</button>
            <button onclick="switchTab('preview')" id="tab-preview" class="flex-1 py-4 text-gray-500 text-xs font-bold">🌐 Preview</button>
        </div>
        <div id="area-code" class="flex-1 p-4 bg-[#1e1e1e] overflow-auto relative">
             <button onclick="downloadCode()" class="absolute top-4 right-4 bg-[#333] text-white px-3 py-1 text-[10px] rounded border border-panel"><i data-lucide="download" class="w-3 h-3 inline mr-1"></i> Save File</button>
            <textarea id="real-code" class="w-full h-full bg-transparent outline-none font-mono text-xs text-green-400 resize-none pt-8" spellcheck="false" readonly></textarea>
        </div>
        <iframe id="area-preview" class="hidden flex-1 bg-white border-none"></iframe>
    </div>

    <script>
        lucide.createIcons();
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('overlay').classList.toggle('hidden'); }
        function showPage(p) { if (p !== 'workspace') toggleMenu(); document.querySelectorAll('.page').forEach(x => x.classList.remove('active')); document.getElementById('page-' + p).classList.add('active'); }
        function switchTab(t) {
            const isCode = t === 'code';
            document.getElementById('area-code').classList.toggle('hidden', !isCode);
            document.getElementById('area-preview').classList.toggle('hidden', isCode);
            if(!isCode) document.getElementById('area-preview').srcdoc = document.getElementById('real-code').value;
            document.getElementById('tab-code').className = isCode ? 'flex-1 py-4 border-b-2 border-blue-500 text-blue-400 text-xs font-bold' : 'flex-1 py-4 text-gray-500 text-xs font-bold';
            document.getElementById('tab-preview').className = !isCode ? 'flex-1 py-4 border-b-2 border-blue-500 text-blue-400 text-xs font-bold' : 'flex-1 py-4 text-gray-500 text-xs font-bold';
        }
        function startAIBuild() {
            const input = document.getElementById('chat-input');
            const btn = document.getElementById('btn-send');
            const statusText = document.getElementById('status-text');
            const statusDot = document.getElementById('status-dot');
            if(!input.value) return;
            btn.disabled = true;
            statusText.innerText = "Eios AI is thinking";
            statusText.classList.add('dots');
            statusDot.className = "w-1.5 h-1.5 bg-blue-500 rounded-full animate-ping";
            setTimeout(() => {
                const prompt = input.value;
                document.getElementById('real-code').value = `<!DOCTYPE html>\n<html>\n<body style="background:#111; color:#4F8CFF; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif;">\n  <div style="border:1px solid #4F8CFF; padding:30px; border-radius:20px; box-shadow:0 0 20px rgba(79,140,255,0.3)">\n    <h1 style="margin:0">Eios Project Created</h1>\n    <p style="color:#888">Request: ${prompt}</p>\n  </div>\n</body>\n</html>`;
                btn.disabled = false; statusText.innerText = "Eios Online"; statusText.classList.remove('dots'); statusDot.className = "w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse";
                showPage('workspace'); switchTab('preview'); input.value = "";
            }, 2000);
        }
        function downloadCode() {
            const code = document.getElementById('real-code').value;
            const blob = new Blob([code], {type: "text/html"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "index.html";
            a.click();
        }
    </script>
</body>
</html>
